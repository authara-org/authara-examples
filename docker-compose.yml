services:
  gateway:
    image: ghcr.io/authara-org/authara-gateway:1.2.0
    ports:
      - "3000:3000"
    environment:
      GATEWAY_BIND: :3000
      AUTHARA_UPSTREAM: authara:8080
      APP_UPSTREAM: testapp:8080
    depends_on:
      - authara
      - testapp

  authara-migrations:
    image: ghcr.io/authara-org/authara-migrations:v0.1.0
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["up", "-env=default", "-config=dbconfig.yaml"]
    restart: "no"

  authara:
    image: ghcr.io/authara-org/authara-core:v0.1.3
    env_file:
      - .env
    depends_on:
      authara-migrations:
        condition: service_completed_successfully

  postgres:
    image: postgres:16.2
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRESQL_DATABASE}
      POSTGRES_USER: ${POSTGRESQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
    healthcheck:
      test: "/usr/bin/pg_isready --dbname=${POSTGRESQL_DATABASE} --username=${POSTGRESQL_USERNAME} || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  testapp:
    build:
      context: ./go+htmx/
      # context: ./go+react/
    environment:
      AUTHARA_AUDIENCE: app
      AUTHARA_BASE_URL: http://authara:8080
      AUTHARA_ISSUER: ${AUTHARA_ISSUER}
      AUTHARA_JWT_KEYS: ${AUTHARA_JWT_KEYS}
      AUTHARA_WEBHOOK_SECRET: ${AUTHARA_WEBHOOK_SECRET}

volumes:
  postgres-data:
